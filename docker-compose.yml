services:
  frontend:
    build:
      context: .
      dockerfile: ./web-dashboard/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      java-api:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: cloudops
      MYSQL_USER: cloudops_user
      MYSQL_PASSWORD: cloudops_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u cloudops_user -pcloudops_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  java-api:
    build:
      context: ./backend-java
    ports:
      - "8080:8080"
    environment:
      - API_PORT=8080
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=cloudops
      - DB_USER=cloudops_user
      - DB_PASSWORD=cloudops_password
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "java", "-cp", "out:mysql-connector-j.jar", "com.es260523874.cloudops.HealthCheck"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  python-worker:
    build:
      context: ./worker-python
    depends_on:
      java-api:
        condition: service_healthy
    environment:
      - WORKER_API_URL=http://java-api:8080
      - LOG_LEVEL=INFO

volumes:
  mysql-data:
